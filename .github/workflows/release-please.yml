name: Release Please

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create release + tag
      pull-requests: write  # open/update release PR
    steps:
      - uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # GITHUB_TOKEN PRs don't trigger CI workflows (by design).
      # Close+reopen the PR to trigger required status checks.
      - name: Trigger CI on release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ fromJSON(steps.release.outputs.pr).number }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh pr close "${PR_NUMBER}" --repo "${GH_REPO}" || true
          gh pr reopen "${PR_NUMBER}" --repo "${GH_REPO}"

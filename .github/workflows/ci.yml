name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo check
      - name: Rustdoc warnings
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps
      - name: License exists
        run: test -f LICENSE
      - name: Shell lint (shellcheck + shfmt)
        run: |
          sudo apt-get install -y shellcheck
          curl -sS https://webi.sh/shfmt | sh
          export PATH="$HOME/.local/bin:$PATH"
          shellcheck scripts/*.sh
          shfmt -d -i 2 -ci -bn scripts/*.sh

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Unit tests
        run: cargo test
      - name: Integration tests
        run: cargo test --test integration
      - name: CLAUDE.md matches codebase
        run: cargo test --test claude_md

  build:
    name: Release Build
    runs-on: macos-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --release
      - name: Verify all 5 binaries
        run: |
          for bin in session-start permissions changelog session-end ensure-worktree; do
            test -f "target/release/$bin" || { echo "MISSING: $bin"; exit 1; }
          done
          echo "All 5 binaries present"
      - name: Check binary sizes
        run: |
          for bin in session-start permissions changelog session-end ensure-worktree; do
            size=$(stat -f%z "target/release/$bin" 2>/dev/null || stat -c%s "target/release/$bin")
            if [ "$size" -gt 5242880 ]; then
              echo "FAIL: $bin is ${size} bytes (> 5MB)"
              exit 1
            fi
            echo "OK: $bin (${size} bytes)"
          done

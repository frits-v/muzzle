name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo check
      - name: Rustdoc warnings
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps
      - name: License exists
        run: test -f LICENSE
      - name: Shell lint (shellcheck + shfmt)
        run: |
          sudo apt-get install -y shellcheck
          curl -sS https://webi.sh/shfmt | sh
          export PATH="$HOME/.local/bin:$PATH"
          shellcheck scripts/*.sh
          shfmt -d -i 2 -ci -bn scripts/*.sh

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests
        run: cargo test
      - name: Integration tests
        run: cargo test --test integration
      - name: CLAUDE.md matches codebase
        run: cargo test --test claude_md

  build:
    name: Release Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Verify all 5 binaries
        run: |
          for bin in session-start permissions changelog session-end ensure-worktree; do
            test -f "target/release/$bin" || { echo "MISSING: $bin"; exit 1; }
          done
          echo "All 5 binaries present"
      - name: Check binary sizes
        run: |
          for bin in session-start permissions changelog session-end ensure-worktree; do
            size=$(stat -f%z "target/release/$bin" 2>/dev/null || stat -c%s "target/release/$bin")
            if [ "$size" -gt 5242880 ]; then
              echo "FAIL: $bin is ${size} bytes (> 5MB)"
              exit 1
            fi
            echo "OK: $bin (${size} bytes)"
          done

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          [[ "${RUNNER_DEBUG:-}" == "1" ]] && set -x
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-check-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-check-${{ runner.os }}-
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo check
      - name: Rustdoc warnings
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps
      - name: License exists
        run: test -f LICENSE
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Shell lint (shellcheck + shfmt)
        run: |
          set -euo pipefail
          [[ "${RUNNER_DEBUG:-}" == "1" ]] && set -x
          mise exec -- shellcheck scripts/*.sh
          mise exec -- shfmt -d -i 2 -ci -bn scripts/*.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          [[ "${RUNNER_DEBUG:-}" == "1" ]] && set -x
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-test-${{ runner.os }}-
      - name: Unit tests
        run: cargo test
      - name: Integration tests
        run: cargo test --test integration
      - name: CLAUDE.md matches codebase
        run: cargo test --test claude_md

  build:
    name: Release Build
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          [[ "${RUNNER_DEBUG:-}" == "1" ]] && set -x
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-build-${{ runner.os }}-
      - run: cargo build --release
      - name: Verify all 5 binaries
        run: |
          set -euo pipefail
          [[ "${RUNNER_DEBUG:-}" == "1" ]] && set -x
          for bin in session-start permissions changelog session-end ensure-worktree; do
            test -f "target/release/$bin" || { echo "MISSING: $bin"; exit 1; }
          done
          echo "All 5 binaries present"
      - name: Check binary sizes
        run: |
          set -euo pipefail
          [[ "${RUNNER_DEBUG:-}" == "1" ]] && set -x
          for bin in session-start permissions changelog session-end ensure-worktree; do
            size=$(stat -f%z "target/release/$bin" 2>/dev/null || stat -c%s "target/release/$bin")
            if (( size > 5242880 )); then
              echo "FAIL: $bin is ${size} bytes (> 5MB)"
              exit 1
            fi
            echo "OK: $bin (${size} bytes)"
          done

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: actionlint
        run: mise exec -- actionlint
      - name: zizmor (pedantic)
        run: mise exec -- zizmor --pedantic .github/workflows/

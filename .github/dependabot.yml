version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      minimum-release-age: 7 days
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      minimum-release-age: 7 days

  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: weekly
    cooldown:
      minimum-release-age: 7 days

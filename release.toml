# cargo-release configuration
# Usage: cargo release patch|minor|major [--execute]

# Pre-release replacements
[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "## \\[Unreleased\\]"
replace = """## [Unreleased]

## [{{version}}] — {{date}}"""

# Tag format
tag-name = "v{{version}}"
tag-message = "Release {{version}}"

# Don't publish to crates.io (binary-only project)
publish = false

# Sign tags
sign-tag = false

# Push after release
push = true
push-remote = "origin"
